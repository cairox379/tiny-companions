<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Realmveil AR</title>

<style>

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent !important;
  font-family: Arial, sans-serif;
  color: white;
}

#world {
  position: fixed;
  inset: 0;

  background:
    radial-gradient(circle at center,
    rgba(0,255,255,0.08),
    transparent 60%);
}

.panel {
  position: fixed;
  background: rgba(10,10,10,0.72);
  border: 1px solid rgba(120,240,255,0.3);
  border-radius: 18px;
  backdrop-filter: blur(14px);
  padding: 12px;
  z-index: 10;
}

#creator {
  top: 14px;
  left: 14px;
  width: 240px;
}

#battleHud {
  top: 14px;
  left: 14px;
  display: none;
}

#actions {
  bottom: 16px;
  left: 14px;
  display: none;
  gap: 6px;
}

button {
  background: rgba(20,20,20,0.8);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: 12px;
}

select {
  width: 100%;
  margin: 6px 0;
  padding: 8px;
  border-radius: 12px;
}

#hero {
  position: fixed;
  left: 18%;
  bottom: 24%;
  font-size: 90px;
  z-index: 5;

  filter:
    drop-shadow(0 0 20px rgba(120,240,255,.7));

  animation:
    floatHero 3s ease-in-out infinite;
}

#monster {
  position: fixed;
  right: 18%;
  bottom: 26%;
  font-size: 95px;
  z-index: 5;

  filter:
    drop-shadow(0 0 25px rgba(255,80,80,.7));

  animation:
    floatMonster 2.7s ease-in-out infinite;
}

.bar {
  width: 160px;
  height: 8px;
  background: rgba(255,255,255,0.15);
  border-radius: 999px;
  overflow: hidden;
  margin: 5px 0;
}

.fill {
  height: 100%;
  width: 100%;
  background:
    linear-gradient(90deg,#00ffcc,#66ddff);
}

#monsterBar {
  background:
    linear-gradient(90deg,#ff5555,#ff8844);
}

#log {
  top: 14px;
  right: 14px;
  max-width: 240px;
  font-size: 12px;
}

.hit {
  animation: hit .22s ease;
}

.attack {
  animation: attack .25s ease;
}

.flash {
  position: fixed;
  left: 50%;
  top: 42%;
  transform: translate(-50%,-50%);
  font-size: 65px;
  z-index: 50;
  animation: flashAnim .9s ease forwards;
}

@keyframes floatHero {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

@keyframes floatMonster {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-14px); }
}

@keyframes hit {
  0% { transform: translateX(0); }
  50% { transform: translateX(-25px); }
  100% { transform: translateX(0); }
}

@keyframes attack {
  0% { transform: scale(1); }
  50% { transform: scale(1.18); }
  100% { transform: scale(1); }
}

@keyframes flashAnim {
  0% {
    opacity: 1;
    transform: translate(-50%,-50%) scale(1);
  }

  100% {
    opacity: 0;
    transform: translate(-50%,-100%) scale(2);
  }
}

</style>
</head>

<body>

<div id="world"></div>

<div id="creator" class="panel">

<b>⚔ Realmveil AR</b><br><br>

Race:
<select id="race">
  <option>Human</option>
  <option>Vampire</option>
  <option>Elf</option>
  <option>Werewolf</option>
  <option>Wraith</option>
</select>

Class:
<select id="classType">
  <option>Knight</option>
  <option>Mage</option>
  <option>Ranger</option>
  <option>Bloodblade</option>
</select>

<button onclick="startGame()">
Begin Quest
</button>

</div>

<div id="battleHud" class="panel">

<b id="heroName"></b>

<div class="bar">
<div id="heroHp" class="fill"></div>
</div>

<small id="stats"></small>

<br><br>

<b id="monsterName"></b>

<div class="bar">
<div id="monsterHp" class="fill" id="monsterBar"></div>
</div>

</div>

<div id="actions" class="panel">

<button onclick="attack()">
⚔ Attack
</button>

<button onclick="spell()">
🔥 Spell
</button>

<button onclick="heal()">
💚 Heal
</button>

<button onclick="spawnMonster()">
👹 Hunt
</button>

</div>

<div id="log" class="panel">
Create your hero.
</div>

<div id="hero">
🧙
</div>

<div id="monster">
👹
</div>

<script>

let hero = {
  hp: 100,
  maxHp: 100,
  xp: 0,
  level: 1,
  attack: 18,
  magic: 24
};

let enemy;

const monsters = [

{
  name: "Goblin Raider",
  hp: 60,
  attack: 12,
  icon: "👹"
},

{
  name: "Stone Troll",
  hp: 120,
  attack: 20,
  icon: "🧌"
},

{
  name: "Night Drake",
  hp: 100,
  attack: 18,
  icon: "🐉"
},

{
  name: "Abyss Wraith",
  hp: 90,
  attack: 22,
  icon: "👻"
},

{
  name: "Vampire Lord",
  hp: 140,
  attack: 24,
  icon: "🧛"
}

];

function log(text) {
  document.getElementById("log").innerText = text;
}

function startGame() {

  const race =
    document.getElementById("race").value;

  const cls =
    document.getElementById("classType").value;

  hero.race = race;
  hero.classType = cls;

  if (race === "Vampire") {
    hero.attack += 8;
  }

  if (race === "Elf") {
    hero.magic += 10;
  }

  if (race === "Werewolf") {
    hero.hp += 35;
    hero.maxHp += 35;
  }

  document.getElementById("creator").style.display = "none";

  document.getElementById("battleHud").style.display = "block";

  document.getElementById("actions").style.display = "flex";

  document.getElementById("hero").innerText =
    getHeroEmoji(race, cls);

  updateHud();

  spawnMonster();

  log(`${race} ${cls} entered the realm.`);
}

function getHeroEmoji(race, cls) {

  if (race === "Vampire") return "🧛";
  if (race === "Elf") return "🧝";
  if (race === "Werewolf") return "🐺";
  if (race === "Wraith") return "🌫️";

  if (cls === "Mage") return "🧙";
  if (cls === "Knight") return "🛡️";

  return "⚔️";
}

function spawnMonster() {

  enemy =
    monsters[
      Math.floor(Math.random() * monsters.length)
    ];

  enemy.maxHp = enemy.hp;

  document.getElementById("monster").innerText =
    enemy.icon;

  updateHud();

  log(`${enemy.name} emerged nearby.`);
}

function updateHud() {

  document.getElementById("heroName").innerText =
    `${hero.race} ${hero.classType}`;

  document.getElementById("monsterName").innerText =
    enemy.name;

  document.getElementById("stats").innerText =
    `Lvl ${hero.level} • XP ${hero.xp}`;

  document.getElementById("heroHp").style.width =
    `${hero.hp / hero.maxHp * 100}%`;

  document.getElementById("monsterHp").style.width =
    `${enemy.hp / enemy.maxHp * 100}%`;
}

function animate(id, className) {

  const el = document.getElementById(id);

  el.classList.add(className);

  setTimeout(() => {
    el.classList.remove(className);
  }, 250);
}

function flash(icon) {

  const el = document.createElement("div");

  el.className = "flash";

  el.innerText = icon;

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 900);
}

function attack() {

  animate("hero","attack");
  animate("monster","hit");

  const damage =
    hero.attack +
    Math.floor(Math.random() * 10);

  enemy.hp -= damage;

  log(`You dealt ${damage} damage.`);

  if (enemy.hp <= 0) {
    winBattle();
    return;
  }

  enemyAttack();

  updateHud();
}

function spell() {

  flash("🔥");

  const damage =
    hero.magic +
    Math.floor(Math.random() * 15);

  enemy.hp -= damage;

  log(`Spell hit for ${damage}.`);

  if (enemy.hp <= 0) {
    winBattle();
    return;
  }

  enemyAttack();

  updateHud();
}

function heal() {

  flash("💚");

  hero.hp += 20;

  if (hero.hp > hero.maxHp)
    hero.hp = hero.maxHp;

  log("You healed.");

  enemyAttack();

  updateHud();
}

function enemyAttack() {

  animate("hero","hit");

  const damage =
    enemy.attack +
    Math.floor(Math.random() * 8);

  hero.hp -= damage;

  log(`${enemy.name} hit you for ${damage}.`);

  if (hero.hp <= 0) {

    hero.hp = hero.maxHp;

    log("You were revived by the realm.");
  }
}

function winBattle() {

  flash("✨");

  hero.xp += 25;

  if (hero.xp >= hero.level * 50) {

    hero.level++;

    hero.maxHp += 15;

    hero.hp = hero.maxHp;

    hero.attack += 4;

    hero.magic += 4;

    log(`LEVEL UP → ${hero.level}`);

  } else {

    log(`${enemy.name} defeated.`);
  }

  updateHud();

  setTimeout(() => {
    spawnMonster();
  }, 1200);
}

</script>

</body>
</html>
