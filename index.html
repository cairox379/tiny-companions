<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Landmark Spirits</title>
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent !important;
}
canvas {
  display: block;
  background: transparent !important;
}
#ui {
  position: fixed;
  top: 14px;
  left: 14px;
  z-index: 10;
  display: flex;
  gap: 6px;
}
button {
  background: rgba(0,0,0,.55);
  color: white;
  border: 1px solid rgba(120,240,255,.5);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: 11px;
}
#text {
  position: fixed;
  top: 55px;
  left: 14px;
  color: white;
  background: rgba(0,0,0,.55);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: 12px;
}
</style>
</head>

<body>
<div id="ui">
  <button onclick="spawnDragon()">🐉 Dragon</button>
  <button onclick="spawnJelly()">🪼 Jellyfish</button>
  <button onclick="spawnGuardian()">👁 Guardian</button>
</div>
<div id="text">Landmark Spirit Ready</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true,
  premultipliedAlpha: false
});

renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.setClearAlpha(0);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 2.2));

const light = new THREE.PointLight(0x80f7ff, 4);
light.position.set(0, 2, 4);
scene.add(light);

let creature;
let particles = [];

function clearScene() {
  if (creature) scene.remove(creature);
  particles.forEach(p => scene.remove(p));
  particles = [];
}

function glowMat(color, opacity=.42) {
  return new THREE.MeshStandardMaterial({
    color,
    emissive: color,
    emissiveIntensity: 1.8,
    transparent: true,
    opacity,
    roughness: .25,
    metalness: .05
  });
}

function sphere(r, color, x, y, z, sx=1, sy=1, sz=1) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r, 32, 32), glowMat(color));
  m.position.set(x,y,z);
  m.scale.set(sx,sy,sz);
  return m;
}

function cone(r,h,color,x,y,z,rx=0,ry=0,rz=0) {
  const m = new THREE.Mesh(new THREE.ConeGeometry(r,h,32), glowMat(color));
  m.position.set(x,y,z);
  m.rotation.set(rx,ry,rz);
  return m;
}

function addParticles(color) {
  for (let i=0; i<40; i++) {
    const p = sphere(.025, color, Math.random()*4-2, Math.random()*3-1.5, Math.random()*-2);
    particles.push(p);
    scene.add(p);
  }
}

window.spawnDragon = function() {
  clearScene();
  document.getElementById("text").innerText = "Glass Dragon awakened";

  creature = new THREE.Group();

  creature.add(sphere(.55, 0x67f7ff, 0, 0, 0, 1.8, .55, .55));
  creature.add(sphere(.32, 0x67f7ff, 1.05, .15, 0, 1.1, .8, .75));

  creature.add(cone(.18, .5, 0x67f7ff, 1.25, .55, 0, 0, 0, -.5));
  creature.add(cone(.18, .5, 0x67f7ff, .9, .55, 0, 0, 0, .5));

  for (let i=0; i<6; i++) {
    creature.add(cone(.09, .35, 0xffffff, -.8 + i*.25, .38, 0, Math.PI, 0, 0));
  }

  const wingL = new THREE.Mesh(
    new THREE.ConeGeometry(.7, 1.3, 4),
    glowMat(0x55ccff, .28)
  );
  wingL.position.set(-.25,.4,-.1);
  wingL.rotation.set(0,0,.9);
  creature.add(wingL);

  const wingR = wingL.clone();
  wingR.rotation.z = -.9;
  wingR.position.x = .25;
  creature.add(wingR);

  creature.scale.set(.85,.85,.85);
  scene.add(creature);
  addParticles(0x67f7ff);
}

window.spawnJelly = function() {
  clearScene();
  document.getElementById("text").innerText = "Bioluminescent Jellyfish drifting";

  creature = new THREE.Group();

  creature.add(sphere(.7, 0xff77ff, 0, .5, 0, 1.2, .7, 1.2));

  for (let i=0; i<8; i++) {
    const tentacle = new THREE.Mesh(
      new THREE.CylinderGeometry(.025,.015,1.8,16),
      glowMat(0x8df7ff,.55)
    );
    tentacle.position.set((i-3.5)*.16,-.55,0);
    tentacle.rotation.z = Math.sin(i)*.2;
    creature.add(tentacle);
  }

  creature.scale.set(.8,.8,.8);
  scene.add(creature);
  addParticles(0xff77ff);
}

window.spawnGuardian = function() {
  clearScene();
  document.getElementById("text").innerText = "Ancient Guardian watching";

  creature = new THREE.Group();

  creature.add(sphere(.7, 0x9b5cff, 0, .1, 0, 1, 1.25, .8));
  creature.add(sphere(.28, 0xffffff, 0, .25, .5, 1.2, .7, .25));
  creature.add(sphere(.11, 0x111111, 0, .25, .68));

  for (let i=0; i<7; i++) {
    creature.add(cone(.08,.45,0x9b5cff,(i-3)*.18,.95,0,0,0,0));
  }

  creature.add(sphere(.18, 0x9b5cff, -.65, -.25, 0, .7, 1.6, .7));
  creature.add(sphere(.18, 0x9b5cff, .65, -.25, 0, .7, 1.6, .7));

  creature.scale.set(.9,.9,.9);
  scene.add(creature);
  addParticles(0x9b5cff);
}

function animate() {
  requestAnimationFrame(animate);
  const t = Date.now() * .001;

  if (creature) {
    creature.rotation.y = Math.sin(t) * .35;
    creature.position.y = Math.sin(t*2) * .12;
  }

  particles.forEach((p,i) => {
    p.position.y += Math.sin(t+i) * .002;
    p.rotation.y += .01;
  });

  renderer.render(scene, camera);
}

animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

spawnDragon();
</script>
</body>
</html>
