<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Tiny Companions</title>

<style>

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: transparent !important;
}

canvas {
  position: fixed;
  inset: 0;
  background: transparent !important;
}

#ui {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 100;
  display: flex;
  gap: 10px;
}

button {
  background: rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  color: white;
  padding: 12px 18px;
  border-radius: 14px;
  font-size: 16px;
  backdrop-filter: blur(12px);
}

button:hover {
  background: rgba(255,255,255,0.15);
  cursor: pointer;
}

</style>
</head>

<body>

<div id="ui">
  <button onclick="loadAnimal('panda')">🐼 Panda</button>
  <button onclick="loadAnimal('fox')">🦊 Fox</button>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(window.devicePixelRatio);

renderer.setClearAlpha(0);

renderer.outputColorSpace = THREE.SRGBColorSpace;

document.body.appendChild(renderer.domElement);



// LIGHTING

const ambient = new THREE.AmbientLight(0xffffff, 2.5);
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 3);

directional.position.set(5, 5, 5);

scene.add(directional);

const rim = new THREE.PointLight(0x66ccff, 4);

rim.position.set(-4, 2, 2);

scene.add(rim);



// LOADER

const loader = new GLTFLoader();

let currentAnimal;
let mixer;



// ANIMAL FILES

const animals = {
  panda: 'panda.glb',
  fox: 'fox.glb'
};



// LOAD ANIMAL

function loadAnimal(type) {

  if (currentAnimal) {
    scene.remove(currentAnimal);
  }

  loader.load(

    animals[type],

    (gltf) => {

      currentAnimal = gltf.scene;

      currentAnimal.scale.set(1.6, 1.6, 1.6);

      currentAnimal.position.set(0, -1.4, 0);

      scene.add(currentAnimal);



      // ENABLE SHADOWS + BETTER MATERIALS

      currentAnimal.traverse((child) => {

        if (child.isMesh) {

          child.castShadow = true;
          child.receiveShadow = true;

          if (child.material) {

            child.material.envMapIntensity = 1.8;

          }

        }

      });



      // ANIMATIONS FROM MODEL

      if (gltf.animations.length > 0) {

        mixer = new THREE.AnimationMixer(currentAnimal);

        gltf.animations.forEach((clip) => {

          mixer.clipAction(clip).play();

        });

      }



      // FLOATING MOTION

      animateFloat();

    },

    undefined,

    (error) => {

      console.error(error);

      alert("Model failed to load");

    }

  );

}



// FLOATING + LOOKING MOTION

function animateFloat() {

  let t = 0;

  function floatLoop() {

    requestAnimationFrame(floatLoop);

    t += 0.02;

    if (currentAnimal) {

      currentAnimal.position.y =
        -1.4 + Math.sin(t) * 0.08;

      currentAnimal.rotation.y =
        Math.sin(t * 0.7) * 0.25;

    }

  }

  floatLoop();

}



// RENDER LOOP

const clock = new THREE.Clock();

function animate() {

  requestAnimationFrame(animate);

  const delta = clock.getDelta();

  if (mixer) mixer.update(delta);

  renderer.render(scene, camera);

}

animate();



// RESIZE

window.addEventListener('resize', () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );

});



// AUTO LOAD PANDA

loadAnimal('panda');



// CUTE SOUND EFFECTS

const pandaSound = new Audio(
  'https://assets.mixkit.co/active_storage/sfx/209/209-preview.mp3'
);

const foxSound = new Audio(
  'https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3'
);

window.loadAnimal = function(type) {

  loadAnimal(type);

  if(type === 'panda') {
    pandaSound.play();
  }

  if(type === 'fox') {
    foxSound.play();
  }

};

</script>

</body>
</html>
