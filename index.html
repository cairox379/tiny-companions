<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tiny Companions</title>

<style>
  body {
    margin: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: transparent;
    color: white;
    font-family: Arial, sans-serif;
  }

  #app {
    position: fixed;
    inset: 0;
  }

  #start {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 210px;
    padding: 12px;
    border-radius: 16px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(255,255,255,0.25);
  }

  h1 {
    font-size: 15px;
    margin: 0 0 10px;
  }

  button {
    border: none;
    border-radius: 12px;
    padding: 9px;
    margin: 4px;
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 12px;
  }

  #pet {
    position: fixed;
    top: 18px;
    right: 18px;
    width: 70px;
    height: 70px;
    display: none;
    animation: float 3s ease-in-out infinite;
  }

  #body {
    position: relative;
    width: 70px;
    height: 70px;
    background: orange;
    border-radius: 50%;
    box-shadow: 0 0 16px rgba(100,240,255,0.8);
  }

  .ear {
    position: absolute;
    top: -5px;
    width: 22px;
    height: 22px;
    background: inherit;
    border-radius: 6px;
    transform: rotate(45deg);
  }

  .left { left: 8px; }
  .right { right: 8px; }

  .eye {
    position: absolute;
    top: 28px;
    width: 6px;
    height: 6px;
    background: #111;
    border-radius: 50%;
    animation: blink 4s infinite;
  }

  .eye.left { left: 24px; }
  .eye.right { right: 24px; }

  .mouth {
    position: absolute;
    top: 43px;
    left: 28px;
    width: 14px;
    height: 7px;
    border-bottom: 2px solid #111;
    border-radius: 0 0 12px 12px;
  }

  .tail {
    position: absolute;
    right: -16px;
    bottom: 13px;
    width: 32px;
    height: 15px;
    background: inherit;
    border-radius: 50%;
    animation: wag 1.3s ease-in-out infinite;
  }

  #bubble {
    position: fixed;
    top: 22px;
    right: 95px;
    max-width: 135px;
    padding: 8px 10px;
    border-radius: 14px;
    background: rgba(0,0,0,0.82);
    border: 1px solid rgba(255,255,255,0.25);
    display: none;
    font-size: 12px;
  }

  #menu {
    position: fixed;
    top: 95px;
    right: 10px;
    display: none;
    flex-direction: column;
    background: rgba(0,0,0,0.78);
    border-radius: 15px;
    padding: 6px;
  }

  .effect {
    position: fixed;
    top: 45px;
    right: 50px;
    font-size: 22px;
    animation: pop 1s forwards;
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  @keyframes wag {
    0%,100% { transform: rotate(-10deg); }
    50% { transform: rotate(16deg); }
  }

  @keyframes blink {
    0%,93%,100% { transform: scaleY(1); }
    96% { transform: scaleY(0.1); }
  }

  @keyframes pop {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-35px) scale(1.4); }
  }
</style>
</head>

<body>
<div id="app">

  <div id="start">
    <h1>Choose Companion</h1>
    <button onclick="choosePet('fox')">🦊 Fox</button>
    <button onclick="choosePet('panda')">🐼 Panda</button>
    <button onclick="choosePet('redpanda')">🍂 Red Panda</button>
    <button onclick="choosePet('monkey')">🐵 Monkey</button>
  </div>

  <div id="bubble"></div>

  <div id="pet" onclick="toggleMenu()">
    <div id="body">
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="mouth"></div>
      <div class="tail"></div>
    </div>
  </div>

  <div id="menu">
    <button onclick="feed(event)">🍓 Feed</button>
    <button onclick="petAction(event)">💖 Pet</button>
    <button onclick="play(event)">✨ Play</button>
    <button onclick="hidePet(event)">🙈 Hide</button>
    <button onclick="changePet(event)">🔁 Change</button>
  </div>

</div>

<script>
  const pets = {
    fox: {
      color: "#f47a2a",
      messages: ["Let’s explore.", "I’m here with you.", "Snack time?", "That looks interesting."]
    },
    panda: {
      color: "#f5f5f5",
      messages: ["You’re doing great.", "Can we chill?", "I missed you.", "That looks peaceful."]
    },
    redpanda: {
      color: "#c95b32",
      messages: ["I feel safe with you.", "Hi, I’m still here.", "Can I have a snack?", "That looks cute."]
    },
    monkey: {
      color: "#b97745",
      messages: ["Tiny chaos time.", "Let’s play.", "That was wild.", "I found bananas."]
    }
  };

  let currentPet = localStorage.getItem("tinyPet") || null;
  let hunger = Number(localStorage.getItem("hunger")) || 60;
  let affection = Number(localStorage.getItem("affection")) || 60;

  const start = document.getElementById("start");
  const pet = document.getElementById("pet");
  const body = document.getElementById("body");
  const bubble = document.getElementById("bubble");
  const menu = document.getElementById("menu");

  function save() {
    localStorage.setItem("tinyPet", currentPet);
    localStorage.setItem("hunger", hunger);
    localStorage.setItem("affection", affection);
    localStorage.setItem("lastInteraction", new Date().toISOString());
  }

  function choosePet(type) {
    currentPet = type;
    save();
    renderPet();
    say("Hi. I’m your tiny companion.");
  }

  function renderPet() {
    if (!currentPet) return;

    start.style.display = "none";
    pet.style.display = "block";
    body.style.background = pets[currentPet].color;
  }

  function randomMessage() {
    const messages = pets[currentPet].messages;
    return messages[Math.floor(Math.random() * messages.length)];
  }

  function say(text) {
    bubble.textContent = text;
    bubble.style.display = "block";

    setTimeout(() => {
      bubble.style.display = "none";
    }, 3000);
  }

  function toggleMenu() {
    if (!currentPet) return;
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
    say(randomMessage());
  }

  function feed(e) {
    e.stopPropagation();
    hunger = Math.min(100, hunger + 20);
    save();
    effect("🍓");
    say("Yum. Thank you.");
  }

  function petAction(e) {
    e.stopPropagation();
    affection = Math.min(100, affection + 20);
    save();
    effect("💖");
    say("That felt nice.");
  }

  function play(e) {
    e.stopPropagation();
    affection = Math.min(100, affection + 10);
    hunger = Math.max(0, hunger - 8);
    save();
    effect("✨");
    say("Again, again!");
  }

  function hidePet(e) {
    e.stopPropagation();
    pet.style.display = "none";
    menu.style.display = "none";
  }

  function changePet(e) {
    e.stopPropagation();
    localStorage.clear();
    location.reload();
  }

  function effect(symbol) {
    const el = document.createElement("div");
    el.className = "effect";
    el.textContent = symbol;
    document.body.appendChild(el);

    setTimeout(() => {
      el.remove();
    }, 1000);
  }

  setInterval(() => {
    if (currentPet) {
      pet.style.display = "block";
      hunger = Math.max(0, hunger - 5);
      save();
      say(randomMessage());
    }
  }, 5 * 60 * 1000);

  renderPet();
</script>
</body>
</html>
