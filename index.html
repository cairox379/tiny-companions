<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tiny Companions</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: transparent !important;
  font-family: Arial, sans-serif;
}

canvas {
  position: fixed;
  inset: 0;
  background: transparent !important;
}

#ui {
  position: fixed;
  top: 12px;
  left: 12px;
  z-index: 10;
  display: flex;
  gap: 6px;
}

button {
  background: rgba(0,0,0,0.55);
  color: white;
  border: 1px solid rgba(120,240,255,0.45);
  border-radius: 10px;
  padding: 7px 9px;
  font-size: 11px;
}

#bubble {
  position: fixed;
  top: 50px;
  left: 12px;
  z-index: 20;
  color: white;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(120,240,255,0.45);
  border-radius: 12px;
  padding: 8px 10px;
  font-size: 12px;
  display: none;
}
</style>
</head>

<body>

<div id="ui">
  <button onclick="makePanda()">🐼 Panda</button>
  <button onclick="makeFox()">🦊 Fox</button>
  <button onclick="jumpPet()">✨ Jump</button>
  <button onclick="playPet()">💖 Play</button>
</div>

<div id="bubble"></div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true,
  premultipliedAlpha: false
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 0);
renderer.setClearAlpha(0);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 2.8));

const key = new THREE.DirectionalLight(0xffffff, 3);
key.position.set(4, 5, 5);
scene.add(key);

const rim = new THREE.PointLight(0x7defff, 3);
rim.position.set(-3, 2, 4);
scene.add(rim);

let pet;
let petType = "panda";
let targetX = 0;
let targetY = -0.45;
let jumping = false;
let jumpVelocity = 0;
let playing = false;

const bubble = document.getElementById("bubble");

function say(text) {
  bubble.textContent = text;
  bubble.style.display = "block";

  clearTimeout(window.bubbleTimer);
  window.bubbleTimer = setTimeout(() => {
    bubble.style.display = "none";
  }, 2500);
}

function mat(color, roughness = 0.55) {
  return new THREE.MeshStandardMaterial({
    color,
    roughness,
    metalness: 0.03
  });
}

function sphere(radius, color, x, y, z, sx = 1, sy = 1, sz = 1) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 32, 32),
    mat(color)
  );

  mesh.position.set(x, y, z);
  mesh.scale.set(sx, sy, sz);

  return mesh;
}

function cone(radius, height, color, x, y, z, rx = 0, ry = 0, rz = 0) {
  const mesh = new THREE.Mesh(
    new THREE.ConeGeometry(radius, height, 32),
    mat(color)
  );

  mesh.position.set(x, y, z);
  mesh.rotation.set(rx, ry, rz);

  return mesh;
}

function cylinder(radius, height, color, x, y, z, rx = 0, ry = 0, rz = 0) {
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(radius, radius, height, 32),
    mat(color)
  );

  mesh.position.set(x, y, z);
  mesh.rotation.set(rx, ry, rz);

  return mesh;
}

function clearPet() {
  if (pet) {
    scene.remove(pet);
    pet = null;
  }
}

function cuteSound(freq = 420) {
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.035, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.22);

  osc.start();
  osc.stop(ctx.currentTime + 0.22);
}

window.makePanda = function() {
  clearPet();

  petType = "panda";
  pet = new THREE.Group();

  const white = 0xf8f4ef;
  const black = 0x111111;
  const blush = 0xffb6c8;

  pet.add(sphere(0.55, white, 0, -0.15, 0, 1, 1.12, 0.95));
  pet.add(sphere(0.42, white, 0, 0.55, 0, 1, 1, 0.95));

  pet.add(sphere(0.17, black, -0.28, 0.83, -0.02));
  pet.add(sphere(0.17, black, 0.28, 0.83, -0.02));

  pet.add(sphere(0.17, black, -0.17, 0.58, 0.34, 1.1, 1.35, 0.65));
  pet.add(sphere(0.17, black, 0.17, 0.58, 0.34, 1.1, 1.35, 0.65));

  pet.add(sphere(0.045, white, -0.12, 0.62, 0.48));
  pet.add(sphere(0.045, white, 0.12, 0.62, 0.48));

  pet.add(sphere(0.035, black, -0.12, 0.62, 0.54));
  pet.add(sphere(0.035, black, 0.12, 0.62, 0.54));

  pet.add(sphere(0.055, black, 0, 0.47, 0.55, 1.2, 0.8, 0.9));

  pet.add(sphere(0.28, white, 0, -0.2, 0.47, 1, 1.25, 0.6));

  pet.add(sphere(0.13, black, -0.47, 0.05, 0.1, 0.8, 1.6, 0.8));
  pet.add(sphere(0.13, black, 0.47, 0.05, 0.1, 0.8, 1.6, 0.8));

  pet.add(sphere(0.15, black, -0.25, -0.7, 0.1, 1.2, 0.75, 0.9));
  pet.add(sphere(0.15, black, 0.25, -0.7, 0.1, 1.2, 0.75, 0.9));

  pet.add(sphere(0.06, blush, -0.26, 0.43, 0.5, 1, 0.6, 0.3));
  pet.add(sphere(0.06, blush, 0.26, 0.43, 0.5, 1, 0.6, 0.3));

  pet.scale.set(0.85, 0.85, 0.85);
  pet.position.set(0, targetY, 0);
  scene.add(pet);

  say("Snack time?");
  cuteSound(360);
};

window.makeFox = function() {
  clearPet();

  petType = "fox";
  pet = new THREE.Group();

  const orange = 0xf47c2c;
  const cream = 0xfff0d8;
  const black = 0x191919;
  const dark = 0x2b1a14;

  pet.add(sphere(0.45, orange, 0, -0.22, 0, 1, 1.18, 0.9));
  pet.add(sphere(0.38, orange, 0, 0.48, 0, 1, 1, 0.9));

  pet.add(cone(0.18, 0.42, orange, -0.23, 0.86, 0, 0, 0, -0.35));
  pet.add(cone(0.18, 0.42, orange, 0.23, 0.86, 0, 0, 0, 0.35));

  pet.add(cone(0.1, 0.25, cream, -0.23, 0.86, 0.05, 0, 0, -0.35));
  pet.add(cone(0.1, 0.25, cream, 0.23, 0.86, 0.05, 0, 0, 0.35));

  pet.add(sphere(0.23, cream, -0.16, 0.4, 0.35, 1.2, 0.75, 0.55));
  pet.add(sphere(0.23, cream, 0.16, 0.4, 0.35, 1.2, 0.75, 0.55));
  pet.add(sphere(0.12, cream, 0, 0.31, 0.48, 1.3, 0.85, 0.7));

  pet.add(sphere(0.055, black, -0.13, 0.56, 0.42));
  pet.add(sphere(0.055, black, 0.13, 0.56, 0.42));

  pet.add(sphere(0.02, whiteColor(), -0.11, 0.58, 0.47));
  pet.add(sphere(0.02, whiteColor(), 0.15, 0.58, 0.47));

  pet.add(sphere(0.04, black, 0, 0.36, 0.62, 1.2, 0.85, 0.8));

  pet.add(sphere(0.25, cream, 0, -0.22, 0.43, 1, 1.3, 0.55));

  pet.add(sphere(0.09, dark, -0.2, -0.7, 0.1, 0.9, 1.1, 0.9));
  pet.add(sphere(0.09, dark, 0.2, -0.7, 0.1, 0.9, 1.1, 0.9));

  pet.add(sphere(0.1, orange, -0.4, -0.2, 0.05, 0.85, 1.6, 0.8));
  pet.add(sphere(0.1, orange, 0.4, -0.2, 0.05, 0.85, 1.6, 0.8));

  const tail = sphere(0.22, orange, 0.55, -0.18, -0.08, 1.9, 0.78, 0.8);
  tail.rotation.z = 0.5;
  tail.name = "tail";
  pet.add(tail);

  const tailTip = sphere(0.13, cream, 0.83, -0.03, -0.06, 1.25, 0.7, 0.7);
  tailTip.rotation.z = 0.5;
  tailTip.name = "tailTip";
  pet.add(tailTip);

  pet.scale.set(0.82, 0.82, 0.82);
  pet.position.set(0, targetY, 0);
  scene.add(pet);

  say("Let’s explore.");
  cuteSound(680);
};

function whiteColor() {
  return 0xffffff;
}

window.jumpPet = function() {
  if (!pet) return;
  jumping = true;
  jumpVelocity = 0.075;
  cuteSound(petType === "fox" ? 680 : 360);
  say("Wheee!");
};

window.playPet = function() {
  if (!pet) return;
  playing = true;
  targetX = Math.random() * 2.2 - 1.1;
  targetY = Math.random() * 0.7 - 0.7;
  cuteSound(petType === "fox" ? 680 : 360);
  say("Let’s play!");

  setTimeout(() => {
    playing = false;
  }, 2500);
};

function animate() {
  requestAnimationFrame(animate);

  const time = Date.now() * 0.001;

  if (pet) {
    pet.position.x += (targetX - pet.position.x) * 0.035;
    pet.position.y += (targetY - pet.position.y) * 0.035;

    pet.position.y += Math.sin(time * 3) * 0.002;
    pet.rotation.y = Math.sin(time * 1.1) * 0.25;

    if (playing) {
      pet.rotation.z = Math.sin(time * 8) * 0.08;
    } else {
      pet.rotation.z *= 0.9;
    }

    const tail = pet.getObjectByName("tail");
    const tailTip = pet.getObjectByName("tailTip");

    if (tail) tail.rotation.z = 0.5 + Math.sin(time * 5) * 0.25;
    if (tailTip) tailTip.rotation.z = 0.5 + Math.sin(time * 5) * 0.25;

    if (jumping) {
      pet.position.y += jumpVelocity;
      jumpVelocity -= 0.005;

      if (pet.position.y <= targetY) {
        pet.position.y = targetY;
        jumping = false;
      }
    }
  }

  renderer.render(scene, camera);
}

animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

makePanda();
</script>

</body>
</html>
