<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}
canvas {
  display: block;
}
button {
  position: fixed;
  top: 10px;
  left: 10px;
  z-index: 10;
}
</style>
</head>
<body>

<button onclick="loadPanda()">Load Panda</button>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.z = 4;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 3));

const light = new THREE.DirectionalLight(0xffffff, 4);
light.position.set(3, 5, 5);
scene.add(light);

let pet;

window.loadPanda = function () {
  const loader = new GLTFLoader();

  loader.load("panda.glb", function (gltf) {
    pet = gltf.scene;

    const box = new THREE.Box3().setFromObject(pet);
    const size = new THREE.Vector3();
    const center = new THREE.Vector3();

    box.getSize(size);
    box.getCenter(center);

    pet.position.sub(center);

    const maxSize = Math.max(size.x, size.y, size.z);
    pet.scale.setScalar(2 / maxSize);

    scene.add(pet);
  }, undefined, function (error) {
    alert("Panda failed to load");
    console.error(error);
  });
};

loadPanda();

function animate() {
  requestAnimationFrame(animate);

  if (pet) {
    pet.rotation.y += 0.01;
    pet.position.y = Math.sin(Date.now() * 0.002) * 0.1;
  }

  renderer.render(scene, camera);
}

animate();

addEventListener("resize", () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
