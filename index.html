<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, viewport-fit=cover"
/>

<title>Tiny Companions</title>

<style>
html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;

  /* IMPORTANT */
  background: #000 !important;
}

canvas {
  position: fixed;
  inset: 0;
  display: block;
  background: transparent !important;
}

#ui {
  position: fixed;
  top: 16px;
  left: 16px;
  z-index: 100;
  display: flex;
  gap: 8px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 10px 14px;

  background: rgba(20,20,20,0.75);
  color: white;

  font-size: 13px;
  font-weight: 600;

  backdrop-filter: blur(10px);

  border: 1px solid rgba(255,255,255,0.15);
}

#speech {
  position: fixed;
  top: 70px;
  left: 16px;
  z-index: 100;

  padding: 10px 14px;
  border-radius: 16px;

  background: rgba(20,20,20,0.75);
  color: white;

  font-size: 13px;

  border: 1px solid rgba(255,255,255,0.15);

  display: none;
}
</style>
</head>

<body>

<div id="ui">
  <button id="pandaBtn">🐼 Panda</button>
  <button id="foxBtn">🦊 Fox</button>
  <button id="jumpBtn">✨ Jump</button>
  <button id="moveBtn">🏃 Play</button>
</div>

<div id="speech">Hello!</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* ---------------- SCENE ---------------- */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

camera.position.z = 7;

const renderer = new THREE.WebGLRenderer({
  alpha: true,
  antialias: true
});

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(
  Math.min(window.devicePixelRatio, 2)
);

/* IMPORTANT */
renderer.setClearColor(0x000000, 0);
renderer.setClearAlpha(0);

document.body.appendChild(renderer.domElement);

/* ---------------- LIGHTS ---------------- */

const ambient = new THREE.AmbientLight(0xffffff, 2.5);
scene.add(ambient);

const light1 = new THREE.DirectionalLight(0xffffff, 3);
light1.position.set(5, 5, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0x66ddff, 3);
light2.position.set(-5, 3, 5);
scene.add(light2);

/* ---------------- SPEECH ---------------- */

const speech = document.getElementById("speech");

function say(text) {
  speech.innerText = text;
  speech.style.display = "block";

  clearTimeout(window.speechTimeout);

  window.speechTimeout = setTimeout(() => {
    speech.style.display = "none";
  }, 2500);
}

/* ---------------- PET ---------------- */

let pet;
let currentType = "panda";

const petGroup = new THREE.Group();
scene.add(petGroup);

/* ---------------- CREATE PANDA ---------------- */

function createPanda() {

  const panda = new THREE.Group();

  const bodyMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.6
  });

  const blackMat = new THREE.MeshStandardMaterial({
    color: 0x111111,
    roughness: 0.6
  });

  /* BODY */
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(1.1, 64, 64),
    bodyMat
  );

  body.scale.y = 1.2;

  panda.add(body);

  /* HEAD */
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 64, 64),
    bodyMat
  );

  head.position.y = 1.3;

  panda.add(head);

  /* EARS */
  const earL = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 32, 32),
    blackMat
  );

  earL.position.set(-0.45, 1.95, 0);

  panda.add(earL);

  const earR = earL.clone();
  earR.position.x = 0.45;

  panda.add(earR);

  /* EYES */
  const eyeGeo = new THREE.SphereGeometry(0.12, 32, 32);

  const eyeMat = new THREE.MeshStandardMaterial({
    color: 0x000000
  });

  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);

  eyeL.position.set(-0.22, 1.35, 0.65);

  panda.add(eyeL);

  const eyeR = eyeL.clone();
  eyeR.position.x = 0.22;

  panda.add(eyeR);

  /* LEGS */
  const legGeo = new THREE.SphereGeometry(0.25, 32, 32);

  const leg1 = new THREE.Mesh(legGeo, blackMat);
  leg1.position.set(-0.45, -1.1, 0.3);

  panda.add(leg1);

  const leg2 = leg1.clone();
  leg2.position.x = 0.45;

  panda.add(leg2);

  panda.scale.set(0.9, 0.9, 0.9);

  return panda;
}

/* ---------------- CREATE FOX ---------------- */

function createFox() {

  const fox = new THREE.Group();

  const orange = new THREE.MeshStandardMaterial({
    color: 0xff7a2f,
    roughness: 0.6
  });

  const white = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.5
  });

  const dark = new THREE.MeshStandardMaterial({
    color: 0x2a1b12,
    roughness: 0.7
  });

  /* BODY */
  const body = new THREE.Mesh(
    new THREE.SphereGeometry(1.0, 64, 64),
    orange
  );

  body.scale.y = 0.9;

  fox.add(body);

  /* HEAD */
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.8, 64, 64),
    orange
  );

  head.position.y = 1.15;

  fox.add(head);

  /* MUZZLE */
  const muzzle = new THREE.Mesh(
    new THREE.SphereGeometry(0.38, 32, 32),
    white
  );

  muzzle.position.set(0, 1.0, 0.6);

  fox.add(muzzle);

  /* EARS */
  const earGeo = new THREE.ConeGeometry(0.18, 0.45, 32);

  const earL = new THREE.Mesh(earGeo, orange);

  earL.position.set(-0.35, 1.9, 0);
  earL.rotation.z = 0.2;

  fox.add(earL);

  const earR = earL.clone();

  earR.position.x = 0.35;
  earR.rotation.z = -0.2;

  fox.add(earR);

  /* EYES */
  const eyeGeo = new THREE.SphereGeometry(0.1, 32, 32);

  const eyeMat = new THREE.MeshStandardMaterial({
    color: 0x111111
  });

  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);

  eyeL.position.set(-0.22, 1.25, 0.65);

  fox.add(eyeL);

  const eyeR = eyeL.clone();
  eyeR.position.x = 0.22;

  fox.add(eyeR);

  /* TAIL */
  const tail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.12, 0.22, 1.5, 32),
    orange
  );

  tail.position.set(-1, -0.1, -0.2);

  tail.rotation.z = -1.1;

  fox.add(tail);

  fox.scale.set(0.9, 0.9, 0.9);

  return fox;
}

/* ---------------- LOAD PET ---------------- */

function loadPet(type) {

  currentType = type;

  if (pet) {
    petGroup.remove(pet);
  }

  pet = type === "fox"
    ? createFox()
    : createPanda();

  pet.position.y = -0.8;

  petGroup.add(pet);

  say(
    type === "fox"
      ? "Let's explore!"
      : "Snack time?"
  );
}

loadPet("panda");

/* ---------------- BUTTONS ---------------- */

document.getElementById("pandaBtn").onclick = () => {
  loadPet("panda");
};

document.getElementById("foxBtn").onclick = () => {
  loadPet("fox");
};

document.getElementById("jumpBtn").onclick = () => {
  if (!pet) return;

  jumping = true;
  velocity = 0.12;
};

document.getElementById("moveBtn").onclick = () => {

  targetX = (Math.random() - 0.5) * 3;
  targetY = -0.8 + Math.random() * 0.5;

  say(
    currentType === "fox"
      ? "Tiny chaos!"
      : "Yay!"
  );
};

/* ---------------- ANIMATION ---------------- */

let targetX = 0;
let targetY = -0.8;

let jumping = false;
let velocity = 0;

function animate() {

  requestAnimationFrame(animate);

  const t = Date.now() * 0.001;

  if (pet) {

    pet.position.x +=
      (targetX - pet.position.x) * 0.03;

    pet.position.y +=
      (targetY - pet.position.y) * 0.03;

    pet.rotation.y =
      Math.sin(t * 1.5) * 0.25;

    pet.position.y +=
      Math.sin(t * 4) * 0.005;

    if (jumping) {

      pet.position.y += velocity;

      velocity -= 0.008;

      if (pet.position.y <= targetY) {

        pet.position.y = targetY;

        jumping = false;
      }
    }

    /* tail wiggle */
    if (currentType === "fox") {
      pet.children.forEach((child) => {
        if (child.geometry?.type === "CylinderGeometry") {
          child.rotation.y =
            Math.sin(t * 6) * 0.4;
        }
      });
    }
  }

  renderer.render(scene, camera);
}

animate();

/* ---------------- RESIZE ---------------- */

window.addEventListener("resize", () => {

  camera.aspect =
    window.innerWidth / window.innerHeight;

  camera.updateProjectionMatrix();

  renderer.setSize(
    window.innerWidth,
    window.innerHeight
  );
});

</script>

</body>
</html>
